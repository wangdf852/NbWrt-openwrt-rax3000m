name: apk

on:
  schedule:
    - cron: 0 21 * * 1
  repository_dispatch:
  workflow_dispatch:

env:
  DIY_P1_SH: sh/op.sh

jobs:
  build_firmware:
    name: 编译固件 - ${{ matrix.device }} - ${{ matrix.source }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        device: ["rax3000m-nand"]
        source: ["openwrt"]
        include:
          - device: "rax3000m-nand"
            config: "CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_cmcc_rax3000m-nand=y"

    steps:
    - name: 检查分支
      uses: actions/checkout@v6

    - name: 释放磁盘空间
      run: |
        sudo rm -rf /etc/apt/sources.list.d
        sudo swapoff -a
        sudo rm -f /swapfile /mnt/swapfile
        sudo docker image prune -a -f
        sudo systemctl stop docker
        sudo snap set system refresh.retain=2
        sudo apt-get -y purge firefox clang* ghc* google* llvm* mono* mongo* mysql* php*
        sudo apt-get -y autoremove --purge
        sudo apt-get clean
        sudo rm -rf /etc/mysql /etc/php /usr/lib/jvm /usr/libexec/docker /usr/local /usr/src/* /var/lib/docker /var/lib/gems /var/lib/mysql /var/lib/snapd /etc/skel /opt/{microsoft,az,hostedtoolcache,cni,mssql-tools,pipx} /usr/share/{az*,dotnet,swift,miniconda,gradle*,java,kotlinc,ri,sbt} /root/{.sbt,.local,.npm}
        sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
        rm -rf ~/{.cargo,.dotnet,.rustup}
        df -Th

    - name: 编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y tar build-essential flex bison cmake g++ gawk gcc-multilib g++-multilib gettext git libfuse-dev libncurses5-dev libssl-dev python3 python3-pip python3-ply python3-distutils python3-pyelftools rsync unzip zlib1g-dev file wget subversion patch upx-ucl autoconf automake curl asciidoc binutils bzip2 lib32gcc-s1 libc6-dev-i386 uglifyjs msmtp texinfo libreadline-dev libglib2.0-dev xmlto libelf-dev libtool autopoint antlr3 gperf ccache swig coreutils haveged scons libpython3-dev rename qemu-utils
        sudo apt-get clean
        git config --global user.name 'GitHub Actions' && git config --global user.email 'noreply@github.com'
        sudo timedatectl set-timezone 'Asia/Shanghai'
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        df -Th

    - name: 设置环境变量
      run: |
        TAG="$(date +'%Y%m%d')"
        echo "tag=$TAG" >> $GITHUB_ENV
        echo "DEVICE_NAME=${{ matrix.device }}" >> $GITHUB_ENV
        echo "SOURCE_NAME=${{ matrix.source }}" >> $GITHUB_ENV
        echo "REPO_URL=https://github.com/shiyu1314/openwrt-source" >> $GITHUB_ENV
        echo "REPO_BRANCH=openwrt-25.12" >> $GITHUB_ENV

    - name: 克隆源代码
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL $SOURCE_NAME
        rm -rf $GITHUB_WORKSPACE/$SOURCE_NAME
        ln -sf /workdir/$SOURCE_NAME $GITHUB_WORKSPACE/$SOURCE_NAME
        if [ ! -L $GITHUB_WORKSPACE/$SOURCE_NAME ] || [ ! -d $GITHUB_WORKSPACE/$SOURCE_NAME ]; then
          echo "Error: 软链接创建失败" && exit 1
        fi

    - name: 切换分支
      run: |
        cd $SOURCE_NAME
        case $REPO_BRANCH in
          openwrt-25.12)
            _release_tag=$(git tag --sort=taggerdate --list 'v25.*' | tail -1)
            if [ -z "$_release_tag" ]; then
              echo "Error: 未找到v25.*标签" && exit 1
            fi
            git checkout $_release_tag || { echo "checkout标签失败"; exit 1; }
            _prerelease=false
            ;;
          *)
            echo "Error: 不支持的分支" && exit 1
            ;;
        esac
        echo "release_tag=$_release_tag" >> $GITHUB_ENV

    - name: 取回缓存 staging_dir
      uses: actions/cache@v5
      with:
        path: |
          ${{ matrix.source }}/staging_dir
        key: ${{ matrix.source }}-${{ matrix.device }}-${{ env.release_tag }}-toolchain-cache
        restore-keys: |
          ${{ matrix.source }}-${{ matrix.device }}-
          ${{ matrix.source }}-

    - name: patch修补
      run: |
        set -x
        cd $SOURCE_NAME
        if [ -d "./staging_dir/" ]; then
          find ./staging_dir/ -type f -exec touch {} + >/dev/null 2>&1 || true
        fi
        ./scripts/feeds update -a
        cd ..
        [ -e patch ] && cp -rf patch/diy/*.patch $SOURCE_NAME
        [ -e patch ] && cp -rf patch/luci/*.patch $SOURCE_NAME/feeds/luci
        [ -e patch ] && cp -rf patch/keys/* $SOURCE_NAME

    - name: 加载自定义脚本
      run: |
        chmod +x $DIY_P1_SH
        cd $SOURCE_NAME
        $GITHUB_WORKSPACE/$DIY_P1_SH
        cd ..
        [ -e patch ] && cp -rf patch/nginx/luci.locations $SOURCE_NAME/feeds/packages/net/nginx/files-luci-support
        [ -e patch ] && cp -rf patch/nginx/uci.conf.template $SOURCE_NAME/feeds/packages/net/nginx-util/files

    - name: 加载自定义配置
      run: |
        [ -e files ] && mv files $SOURCE_NAME/files
        cat <<EOF >>$SOURCE_NAME/.config
        CONFIG_TARGET_mediatek=y
        CONFIG_TARGET_mediatek_filogic=y
        ${{ matrix.config }}
        EOF
        [ -e config ] && cat config/config-apk >> $SOURCE_NAME/.config

    - name: 下载编译依赖
      id: package
      run: |
        cd $SOURCE_NAME
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译源码
      id: compile
      timeout-minutes: 140
      run: |
        cd $SOURCE_NAME
        FREE_GB=$(df -P /workdir | awk 'NR==2 {print $4/1024/1024}')
        if (( $(echo "$FREE_GB < 10" | bc -l) )); then
          echo "Error: 磁盘空间不足" && exit 1
        fi
        CORES=$(( $(nproc) - 1 ))
        echo -e "$CORES 线程编译"
        make -j$CORES V=s || make -j1 V=s

    - name: 查看磁盘使用情况
      if: (!cancelled())
      run: df -hT

    - name: 整理文件
      id: organize
      run: |
        mkdir -p $SOURCE_NAME/bin/packages/aarch64_cortex-a53/kmod
        cp -rf $SOURCE_NAME/bin/targets/*/*/*/* $SOURCE_NAME/bin/packages/aarch64_cortex-a53/kmod || true
        rm -rf $SOURCE_NAME/bin/packages/*/routing
        rm -rf $SOURCE_NAME/bin/packages/*/telephony

        TARGET_DIR=$(find $SOURCE_NAME/bin/targets -type d -path "*/mediatek/filogic" | head -1)
        if [ -z "$TARGET_DIR" ]; then
          echo "Error: 未找到编译目录" && exit 1
        fi
        cd $TARGET_DIR
        rm -rf packages *.buildinfo profiles.json *.manifest *bl2.bin *kernel.bin *.sha sha256sums
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    - name: 签名
      run: |
        cd $SOURCE_NAME
        if [ ! -f "kmod-sign" ]; then
          echo "Error: 缺少签名脚本" && exit 1
        fi
        chmod +x kmod-sign
        bash kmod-sign bin/packages/aarch64_cortex-a53/base || exit 1
        bash kmod-sign bin/packages/aarch64_cortex-a53/kmod || exit 1
        bash kmod-sign bin/packages/aarch64_cortex-a53/luci || exit 1
        bash kmod-sign bin/packages/aarch64_cortex-a53/packages || exit 1

    - name: 上传apk
      env:
        GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      run: |
        cd $SOURCE_NAME/bin/packages
        git init
        git config --local user.name "github-actions[bot]"
        git config --local user.email "41898282+github-actions@users.noreply.github.com"
        git add .
        # 【容错修改】加 || 逻辑
        git commit -m "${{ env.tag }}" || echo "无文件变更，跳过提交"
        git branch -M main
        git remote add origin https://github-action:$GITHUB_TOKEN@github.com/wangdf852/NbWrt-openwrt-rax3000m
        git push -u origin main --force
